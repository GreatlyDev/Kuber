name: Tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  python:
    name: Python tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest

      - name: Run API smoke check
        run: |
          python -m uvicorn devassist_api.main:app --host 127.0.0.1 --port 8000 &
          API_PID=$!
          trap 'kill "$API_PID"' EXIT
          sleep 5
          python scripts/smoke_check.py --base-url http://127.0.0.1:8000

  container:
    name: Docker build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t devassist-api:ci .
